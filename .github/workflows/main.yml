name: CI

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-html5:
    name: Build & Deploy HTML5
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Haxe
      uses: krdlab/setup-haxe@v1
      with:
        haxe-version: 4.3.6

    - name: Cache Haxe Libraries
      uses: actions/cache@v4
      id: cache-haxelib
      with:
        path: ~/haxelib
        # Đổi thành 'Linux' cố định để dùng chung cache với job Ubuntu Desktop bên dưới
        key: Linux-haxelib-v1

    - name: Install Haxe Libraries
      if: steps.cache-haxelib.outputs.cache-hit != 'true'
      run: |
        haxelib setup ~/haxelib
        haxelib install lime --quiet
        haxelib install openfl --quiet
        haxelib install flixel --quiet
        haxelib install flixel-addons --quiet
        haxelib install flixel-ui --quiet

    - name: Setup Lime
      run: |
        haxelib setup ~/haxelib
        haxelib run lime setup --quiet

    - name: Build HTML5
      run: haxelib run lime build html5 -final -D chooseYourDevice

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./export/html5/bin
        force_orphan: true
      if: github.ref == 'refs/heads/main'

  build-desktop:
    name: Build Hashlink (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Haxe
      uses: krdlab/setup-haxe@v1
      with:
        haxe-version: 4.3.6

    - name: Cache Haxe Libraries
      uses: actions/cache@v4
      id: cache-haxelib
      with:
        path: ~/haxelib
        # macOS và Windows tự tạo key riêng, còn Ubuntu sẽ tự ra chữ 'Linux' trùng với job HTML5 ở trên
        key: ${{ runner.os }}-haxelib-v1

    - name: Install Haxe Libraries
      if: steps.cache-haxelib.outputs.cache-hit != 'true'
      run: |
        haxelib setup ~/haxelib
        haxelib install lime --quiet
        haxelib install openfl --quiet
        haxelib install flixel --quiet
        haxelib install flixel-addons --quiet
        haxelib install flixel-ui --quiet

    - name: Setup Lime
      run: |
        haxelib setup ~/haxelib
        haxelib run lime setup --quiet

    - name: Build Hashlink Game
      run: haxelib run lime build hl -final

    - name: Upload Desktop Artifacts
      # ĐÃ SỬA: Tên chuẩn của GitHub Action để upload file build
      uses: actions/upload-artifact@v4
      with:
        name: game-${{ matrix.os }}-hashlink
        path: export/hl/bin