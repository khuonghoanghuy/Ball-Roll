name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: windows
            title: Windows
            runs-on: windows-latest
            hl-pattern: "hashlink-*-win64.zip"
            hl-bin: "hl.exe"
          - target: macos-x64
            title: Mac (x64)
            runs-on: macos-13
            hl-pattern: "hashlink-*-darwin-cmake.tar.gz"
            hl-bin: "hl"
          - target: linux
            title: Linux
            runs-on: ubuntu-latest
            hl-pattern: "hashlink-*-linux-arm64.tar.gz"
            hl-bin: "hl"

    name: build${{ matrix.title }}
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@main

      - name: Download HashLink
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            "windows")
              URL="https://github.com/HaxeFoundation/hashlink/releases/download/latest/hashlink-68bd192-win64.zip"
              ;;
            "macos-x64")
              URL="https://github.com/HaxeFoundation/hashlink/releases/download/latest/hashlink-68bd192-darwin-cmake.tar.gz"
              ;;
            "linux")
              URL="https://github.com/HaxeFoundation/hashlink/releases/download/latest/hashlink-68bd192-linux-arm64.tar.gz"
              ;;
          esac
          
          echo "Downloading from: $URL"
          curl -L -o hashlink-download "$URL"
          
          # Extract based on file extension
          if [[ "${{ matrix.target }}" == "windows" ]]; then
            unzip -q hashlink-download -d ./hashlink
          else
            mkdir -p ./hashlink
            tar -xzf hashlink-download -C ./hashlink
          fi
          
          rm hashlink-download
          
          echo "Downloaded and extracted HashLink:"
          ls -la ./hashlink

      - name: Find and set HashLink path
        shell: bash
        run: |
          echo "Contents of ./hashlink:"
          ls -la ./hashlink
          
          HL_DIR=$(find ./hashlink -type d -name "hashlink-*" | head -n 1)
          
          if [ -z "$HL_DIR" ]; then
            # If no hashlink-* folder, maybe files were extracted directly
            HL_DIR="./hashlink"
          fi
          
          echo "HL_PATH=$(pwd)/$HL_DIR" >> $GITHUB_ENV
          echo "HL_BIN=$HL_DIR/${{ matrix.hl-bin }}" >> $GITHUB_ENV
          
          echo "Found HashLink at: $HL_DIR"
          echo "Contents of $HL_DIR:"
          ls -la "$HL_DIR"

      - name: Make HashLink executable (macOS/Linux)
        if: matrix.target != 'windows'
        run: chmod +x ${{ env.HL_BIN }}

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Installing Libraries
        run: |
          haxelib install hxpkg 
          haxelib run hxpkg install

      - name: Setup Lime with downloaded HashLink
        run: haxelib run lime setup hl ${{ env.HL_PATH }}

      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        run: haxelib run lime build hl -final

      - name: Tar files (macOS)
        if: contains(matrix.target, 'macos')
        run: tar -zcvf Template.tar.gz export/release/hl/bin

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.target }}Build
          path: export/release/hl/bin

      - name: Cleanup HashLink
        if: always()
        run: |
          rm -rf ./hashlink
          echo "HashLink downloaded files removed"