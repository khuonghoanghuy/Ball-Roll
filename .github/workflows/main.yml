name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - target: windows
            title: Windows
            runs-on: windows-latest
            hl-bin: "hl.exe"
          - target: macos-x64
            title: Mac (x64)
            runs-on: macos-14
            hl-bin: "hl"
          - target: linux
            title: Linux
            runs-on: ubuntu-latest
            hl-bin: "hl"

    name: build${{ matrix.title }}
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@main

      - name: Download HashLink
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            "windows")
              URL="https://github.com/HaxeFoundation/hashlink/releases/download/latest/hashlink-68bd192-win64.zip"
              ;;
            "macos-x64")
              URL="https://github.com/HaxeFoundation/hashlink/releases/download/latest/hashlink-68bd192-darwin-cmake.tar.gz"
              ;;
            "linux")
              URL="https://github.com/HaxeFoundation/hashlink/releases/download/latest/hashlink-68bd192-linux-arm64.tar.gz"
              ;;
          esac
          
          echo "Downloading from: $URL"
          curl -L -o hashlink-download "$URL"
          
          mkdir -p ./hashlink
          
          if [[ "${{ matrix.target }}" == "windows" ]]; then
            unzip -q hashlink-download -d ./hashlink
          else
            tar -xzf hashlink-download -C ./hashlink
          fi
          
          rm hashlink-download
          
          echo "Downloaded and extracted HashLink:"
          ls -la ./hashlink

      - name: Set HashLink paths
        shell: bash
        run: |
          HL_PATH="$(pwd)/hashlink"
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            HL_PATH_WIN=$(echo "$HL_PATH" | sed 's|^/\([a-zA-Z]\)/|\U\1:/|')
            echo "HL_PATH=$HL_PATH_WIN" >> $GITHUB_ENV
            echo "HL_BIN=$HL_PATH_WIN/${{ matrix.hl-bin }}" >> $GITHUB_ENV
          else
            echo "HL_PATH=$HL_PATH" >> $GITHUB_ENV
            echo "HL_BIN=$HL_PATH/${{ matrix.hl-bin }}" >> $GITHUB_ENV
          fi
          
          echo "HashLink path: $HL_PATH"
          echo "HashLink binary: $HL_PATH/${{ matrix.hl-bin }}"
          echo "Contents of hashlink folder:"
          ls -la ./hashlink

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Installing Libraries
        run: |
          haxelib install hxpkg 
          haxelib run hxpkg install

      - name: Setup Lime with downloaded HashLink (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Write-Output "$env:HL_PATH" | haxelib run lime setup hl

      - name: Setup Lime with downloaded HashLink (macOS/Linux)
        if: matrix.target != 'windows'
        shell: bash
        run: |
          echo "${{ env.HL_PATH }}" | haxelib run lime setup hl

      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        shell: bash
        run: |
          haxelib run lime build hl -final

      - name: Tar files (macOS)
        if: contains(matrix.target, 'macos')
        run: tar -zcvf Template.tar.gz export/release/hl/bin

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.target }}Build
          path: export/release/hl/bin

      - name: Cleanup HashLink (Windows)
        if: matrix.target == 'windows'
        shell: cmd
        run: |
          if exist .\hashlink rmdir /s /q .\hashlink
          echo "HashLink downloaded files removed"

      - name: Cleanup HashLink (macOS/Linux)
        if: matrix.target != 'windows'
        shell: bash
        run: |
          rm -rf ./hashlink
          echo "HashLink downloaded files removed"